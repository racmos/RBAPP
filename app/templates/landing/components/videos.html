<!-- Videos — HTMX Partial -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for item in items %}
    <article class="content-card group" tabindex="0">
        {% if item.thumbnail %}
        <div class="relative overflow-hidden">
            <img src="{{ item.thumbnail }}" alt="{{ item.title }}"
                class="content-card-image group-hover:scale-[1.02] transition-transform duration-500" loading="lazy" />
            <!-- Play icon overlay -->
            <div
                class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center">
                    <svg class="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                </div>
            </div>
        </div>
        {% else %}
        <div class="w-full aspect-video bg-surface-200 flex items-center justify-center">
            <svg class="w-10 h-10 text-white/10" fill="currentColor" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>
        </div>
        {% endif %}
        <div class="content-card-body">
            <span class="text-xs text-white/30 mb-1.5 block">
                <!-- YouTube icon -->
                <span class="inline-flex items-center gap-1">
                    <svg class="w-3 h-3 text-red-500" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M23.498 6.186a3 3 0 00-2.11-2.124C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.388.517A3 3 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3 3 0 002.11 2.124c1.883.517 9.388.517 9.388.517s7.505 0 9.388-.517a3 3 0 002.11-2.124C24 15.93 24 12 24 12s0-3.93-.502-5.814z" />
                        <path d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="white" />
                    </svg>
                    {{ item.channel }}
                </span>
                · {{ item.date or "Reciente" }}
            </span>
            <h3 class="text-sm font-semibold text-white/90 leading-snug mb-4 line-clamp-2 flex-1">
                {{ item.title }}
            </h3>
            <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer"
                class="inline-flex items-center gap-1.5 text-xs font-medium text-red-400 hover:text-red-300 transition-colors cursor-pointer"
                tabindex="0">
                Ver en YouTube
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
            </a>
        </div>
    </article>
    {% endfor %}
</div>
