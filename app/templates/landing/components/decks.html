<!-- Decks — HTMX Partial -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for item in items %}
    <article class="glass-card p-5 group cursor-pointer" tabindex="0">
        <div class="flex gap-4">
            <!-- Legend image -->
            {% if item.legend_image %}
            <img src="{{ item.legend_image }}" alt="{{ item.title }}"
                class="w-16 h-16 rounded-xl object-cover bg-surface-200 flex-shrink-0 ring-1 ring-white/[0.06]"
                loading="lazy" />
            {% else %}
            <div
                class="w-16 h-16 rounded-xl bg-surface-200 flex items-center justify-center flex-shrink-0 ring-1 ring-white/[0.06]">
                <svg class="w-6 h-6 text-white/10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            {% endif %}
            <div class="flex-1 min-w-0">
                <h3 class="text-sm font-semibold text-white/90 leading-snug line-clamp-1 mb-1.5">
                    {{ item.title }}
                </h3>
                <div class="flex items-center gap-2 text-xs text-white/40 mb-2">
                    <span>{{ item.date }}</span>
                    {% if item.set_initials %}
                    <span class="px-1.5 py-0.5 rounded bg-white/[0.06] text-white/50 text-[10px] font-mono">{{
                        item.set_initials }}</span>
                    {% endif %}
                </div>
                <!-- Domain color badges -->
                {% if item.domains %}
                <div class="flex flex-wrap gap-1.5">
                    {% for domain in item.domains %}
                    <span class="px-2 py-0.5 rounded-full text-[10px] font-medium
            {% if domain == 'Demacia' %}bg-yellow-500/10 text-yellow-300 border border-yellow-500/20
            {% elif domain == 'Noxus' %}bg-red-500/10 text-red-300 border border-red-500/20
            {% elif domain == 'Ionia' %}bg-pink-500/10 text-pink-300 border border-pink-500/20
            {% elif domain == 'Piltover' %}bg-amber-500/10 text-amber-300 border border-amber-500/20
            {% elif domain == 'Freljord' %}bg-cyan-500/10 text-cyan-300 border border-cyan-500/20
            {% elif domain == 'Bilgewater' %}bg-teal-500/10 text-teal-300 border border-teal-500/20
            {% elif domain == 'Targon' %}bg-purple-500/10 text-purple-300 border border-purple-500/20
            {% elif domain == 'Spirit' %}bg-blue-500/10 text-blue-300 border border-blue-500/20
            {% else %}bg-white/[0.06] text-white/50 border border-white/[0.06]
            {% endif %}">
                        {{ domain }}
                    </span>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
        </div>
        <div class="mt-4 pt-3 border-t border-white/[0.04]">
            <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer"
                class="text-xs text-accent-glow hover:text-white transition-colors font-medium" tabindex="0">
                Ver deck →
            </a>
        </div>
    </article>
    {% endfor %}
</div>
